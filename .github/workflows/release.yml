name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          version="dev-${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF#refs/tags/}"
          fi

          mkdir -p dist
          ext=""
          if [ "${GOOS}" = "windows" ]; then
            ext=".exe"
          fi
          out="dist/ra2fnt-${GOOS}-${GOARCH}${ext}"
          go build -trimpath -ldflags="-s -w -X main.version=${version}" -o "${out}" ./src/cmd/ra2fnt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ra2fnt-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -maxdepth 3 -type f -print -exec cp {} release/ \;

      - name: Package release archives
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          mkdir -p packaged

          for file in release/*; do
            base="$(basename "${file}")"
            stem="${base%.exe}"
            stage_dir="$(mktemp -d)"

            cp "${file}" "${stage_dir}/"
            cp README.md LICENSE THIRD_PARTY_NOTICES.md "${stage_dir}/"

            if [[ "${base}" == *.exe ]]; then
              asset="packaged/${stem}-${version}.zip"
              (
                cd "${stage_dir}"
                zip -q -r "${GITHUB_WORKSPACE}/${asset}" .
              )
            else
              asset="packaged/${stem}-${version}.tar.gz"
              tar -C "${stage_dir}" -czf "${asset}" .
            fi

            rm -rf "${stage_dir}"
          done

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: packaged/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
